services:

  mongo:
    image: mongo:7
    container_name: todo-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - app-net

  backend:
    build: ./backend
    container_name: todo-backend
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017/mern-todo
      PORT: 5000
    depends_on:
      - mongo
    networks:
      - app-net

  frontend:
    build: ./frontend
    container_name: todo-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-net

volumes:
  mongo-data:

networks:
  app-net:
    driver: bridge
