# Scan the Dockerfile for issues & CVEs
name: Docker Lint

on: 
    #workflow_call:
    workflow_dispatch:
      

jobs:
    validate-dockerfile:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            
            - name: Validate Dockerfile
              uses: hadolint/hadolint-action@v3.1.0
              with:
                dockerfile: "**Dockerfile"
                recursive: true